# 开发环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/waytrip_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true # 输入你的数据库连接URL，确保数据库名称和连接参数正确
    username: root
    password: 123456789 # 输入你的数据库密码
  data:
    redis:
      host: localhost
      port: 6379
      password:  # 默认安装的 Redis 无密码，留空即可
      database: 0

# JWT 配置
jwt:
  secret: travel-recommendation-system-jwt-secret-key-dev-2026 # 已自动生成开发环境密钥
  expiration: 604800000  # 7天（毫秒）
  admin-expiration: 86400000  # 1天（毫秒）

# 微信小程序配置
wx:
  appid: # 输入你的微信小程序的appid ## 记得在 travel-miniapp/src/manifest.json 中修改appid
  secret: # 输入你的微信小程序的secret # 在https://mp.weixin.qq.com/注册获取

# 文件上传配置
upload:
  path: ./uploads
  max-size: 5242880  # 5MB
